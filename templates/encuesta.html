<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Satisfacción</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/encuesta-style.css">
</head>
<body>
    <!-- Menú lateral con logo ajustado -->
    <nav class="menu" aria-expanded="false">
        <div class="logo-container">
            <img src="/static/images/logo.png" alt="Logo">
            <h1>DETECTOR DE ALCOHOL EN EL CUERPO</h1>
        </div>
        <ul>
            <li><a href="{{ url_for('index') }}">Inicio</a></li>
            <li class="active"><a href="{{ url_for('encuesta') }}">Encuesta</a></li>
            <li><a href="{{ url_for('lista_encuestas') }}">Ver Encuestas</a></li>
            <li><a href="{{ url_for('logout') }}">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <!-- Botón hamburguesa -->
    <div class="menu-toggle" aria-label="Abrir menú de navegación">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Contenedor principal -->
    <div class="container">
        <!-- Formulario de encuesta -->
        <div class="user-data">
            <h2>Encuesta de Satisfacción</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form action="{{ url_for('guardar_encuesta') }}" method="POST" id="encuestaForm" onsubmit="return confirm('¿Está seguro de que desea enviar esta encuesta?');">
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ingrese su nombre completo">
                </div>
                
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                </div>
                
                <div class="form-group">
                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>
                
                <div class="form-group">
                    <label for="satisfaccion">¿Cómo calificas nuestro servicio?</label>
                    <select id="satisfaccion" name="satisfaccion" required>
                        <option value="" disabled selected>Selecciona una opción</option>
                        <option value="1">Muy Malo</option>
                        <option value="2">Malo</option>
                        <option value="3">Regular</option>
                        <option value="4">Bueno</option>
                        <option value="5">Excelente</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="comentario">Comentarios:</label>
                    <textarea id="comentario" name="comentario" rows="4" placeholder="Escribe tus comentarios, sugerencias o quejas"></textarea>
                </div>
                
                <button type="submit" class="btn-primary">Enviar Encuesta</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const menuToggle = document.querySelector('.menu-toggle');
            const menu = document.querySelector('.menu');
            const fechaInput = document.getElementById('fecha');
            
            // Configurar fecha actual
            const today = new Date().toISOString().split('T')[0];
            fechaInput.value = today;
            
            // Manejar menú
            if (menuToggle && menu) {
                menuToggle.addEventListener('click', () => {
                    menu.classList.toggle('active');
                    menuToggle.classList.toggle('active');
                    menu.setAttribute('aria-expanded', menu.classList.contains('active'));
                });
            }
        });
    </script>
</body>
</html>
